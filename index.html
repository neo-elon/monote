<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monote — 작가를 위한 모노톤 메모장</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a1a'/><text y='68' x='15' font-size='70' font-family='Outfit, sans-serif' font-weight='700' fill='%23fbfbf9'>m.</text></svg>">
    <!-- Google Fonts: Nanum Myeongjo for Literary Serif, Outfit for Sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Outfit:wght@200;300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body class="light-mode">
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area" id="logo-area" title="책장으로 돌아가기">
                <span class="logo">Monote</span>
                <span class="logo-sub">for writers</span>
            </div>
            <div class="header-actions">
                <div id="cloud-sync-status" class="sync-status" title="클라우드 동기화 상태">
                    <span class="sync-dot"></span>
                    <span class="sync-text">대기 중</span>
                </div>
                
                <div id="auth-container" class="auth-container"></div>
                
                <div class="menu-dropdown-container">
                    <button id="menu-btn" class="btn-icon" title="메뉴" aria-label="Menu">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="12" cy="5" r="1"></circle>
                            <circle cx="12" cy="19" r="1"></circle>
                        </svg>
                    </button>
                    <div id="menu-dropdown" class="menu-dropdown">
                        <button id="theme-toggle" class="dropdown-item" title="테마 변경">
                            <span class="dropdown-icon">
                                <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="5"></circle>
                                    <line x1="12" y1="1" x2="12" y2="3"></line>
                                    <line x1="12" y1="21" x2="12" y2="23"></line>
                                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                    <line x1="1" y1="12" x2="3" y2="12"></line>
                                    <line x1="21" y1="12" x2="23" y2="12"></line>
                                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                                </svg>
                                <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                                </svg>
                            </span>
                            테마 변경
                        </button>
                        <button id="toggle-manual-item" class="dropdown-item" title="설명서 보이기/숨기기">
                            <span class="dropdown-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                                </svg>
                            </span>
                            <span id="toggle-manual-text">설명서 숨기기</span>
                        </button>
                        <button id="import-project-trigger" class="dropdown-item" title="백업 파일 불러오기">
                            <span class="dropdown-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </span>
                            백업 불러오기 (.json)
                        </button>
                        <button id="export-project" class="dropdown-item" title="전체 백업 다운로드 (.json)">
                            <span class="dropdown-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                            </span>
                            백업 다운로드 (.json)
                        </button>
                        <button id="export-project-txt" class="dropdown-item" title="전체 원고 다운로드 (.txt)">
                            <span class="dropdown-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            </span>
                            전체 원고 다운로드 (.txt)
                        </button>
                        <button id="logout-menu-item" class="dropdown-item" title="로그아웃" style="display: none; border-top: 1px solid var(--border-color); color: var(--danger-color);">
                            <span class="dropdown-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--danger-color);"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            </span>
                            로그아웃
                        </button>
                    </div>
                </div>
                <input type="file" id="import-project-file" accept=".json" style="display: none;">
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="app-main">
            <!-- VIEW 0: BOOKSHELF SCREEN -->
            <section id="bookshelf-screen" class="view-section active">
                <div class="bookshelf-header">
                    <h2 class="bookshelf-title" id="bookshelf-title">내 책장</h2>
                    <button id="create-project-btn" class="btn-flat btn-sm">
                        <span class="plus-icon">+</span> 새 작품 추가
                    </button>
                </div>
                
                <!-- Book Cover Creation Modal / Form Dialog (Hidden by default) -->
                <div id="new-book-dialog" class="book-dialog" style="display: none;">
                    <div class="dialog-content">
                        <h3>새 작품 추가</h3>
                        <div class="dialog-field">
                            <label for="new-book-title">작품 제목</label>
                            <input type="text" id="new-book-title" class="input-flat" placeholder="제목을 입력하세요..." autocomplete="off">
                        </div>
                        <div class="dialog-field">
                            <label>표지 색상</label>
                            <div class="cover-color-picker">
                                <label class="color-option charcoal active"><input type="radio" name="cover-color" value="charcoal" checked><span></span></label>
                                <label class="color-option linen"><input type="radio" name="cover-color" value="linen"><span></span></label>
                                <label class="color-option ivory"><input type="radio" name="cover-color" value="ivory"><span></span></label>
                                <label class="color-option slate"><input type="radio" name="cover-color" value="slate"><span></span></label>
                                <label class="color-option terracotta"><input type="radio" name="cover-color" value="terracotta"><span></span></label>
                            </div>
                        </div>
                        <div class="dialog-actions">
                            <button id="cancel-new-book" class="btn-flat btn-sm btn-danger">취소</button>
                            <button id="confirm-new-book" class="btn-flat btn-sm">생성</button>
                        </div>
                    </div>
                </div>
                
                <!-- Pen Name Registration Dialog -->
                <div id="penname-dialog" class="book-dialog" style="display: none;">
                    <div class="dialog-content">
                        <h3>작가 필명 설정</h3>
                        <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0.5rem;">
                            Monote에서 작품 표지와 헤더에 구글 계정이름 대신 표시될 필명을 설정해 주세요. 언제든지 재설정할 수 있습니다.
                        </p>
                        <div class="dialog-field">
                            <label for="new-penname">필명</label>
                            <input type="text" id="new-penname" class="input-flat" placeholder="필명을 입력하세요..." autocomplete="off">
                        </div>
                        <div class="dialog-actions">
                            <button id="confirm-penname" class="btn-flat btn-sm">설정 완료</button>
                        </div>
                    </div>
                </div>

                <div id="books-grid" class="books-grid">
                    <!-- Book covers will be generated dynamically -->
                </div>
            </section>

            <!-- VIEW 1: OVERVIEW SCREEN -->
            <section id="overview-screen" class="view-section">
                <div class="overview-grid">
                    <!-- Left Column: Novel Info & Synopsis -->
                    <div class="project-info-panel">
                        <div class="panel-section">
                            <label for="project-title" class="section-label">작품 제목</label>
                            <input type="text" id="project-title" class="input-flat title-input"
                                placeholder="작품의 이름을 지어주세요..." autocomplete="off">
                        </div>
                        <div class="panel-section">
                            <div class="label-row">
                                <label for="project-synopsis" class="section-label">전체 시놉시스 / 개요</label>
                                <span id="synopsis-word-count" class="char-counter">0자</span>
                            </div>
                            <textarea id="project-synopsis" class="textarea-flat synopsis-textarea"
                                placeholder="여기에 이야기의 시작과 끝, 핵심 줄거리를 기록하세요..."></textarea>
                        </div>
                        <div class="panel-section">
                            <div class="label-row">
                                <label for="project-ideas" class="section-label">아이디어 노트</label>
                                <span id="ideas-word-count" class="char-counter">0자</span>
                            </div>
                            <textarea id="project-ideas" class="textarea-flat ideas-textarea"
                                placeholder="떠오르는 아이디어, 인물 설정, 배경 지식 등을 자유롭게 메모하세요..."></textarea>
                        </div>
                    </div>

                    <!-- Right Column: Chapters List -->
                    <div id="chapters-panel" class="chapters-panel">
                        <div class="panel-header">
                            <h2 class="panel-title">목차 및 챕터</h2>
                            <button id="add-chapter-btn" class="btn-flat btn-sm">
                                <span class="plus-icon">+</span> 챕터 추가
                            </button>
                        </div>
                        <div id="chapters-list" class="chapters-list">
                            <!-- Chapter cards will be generated dynamically -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- VIEW 2: WRITING SCREEN -->
            <section id="writing-screen" class="view-section">
                <div class="writing-container-layout">
                    <!-- Left Sidebar (Chapters Panel will be dynamically moved here in JS) -->
                    <div id="editor-sidebar" class="editor-sidebar"></div>

                    <!-- Right Main Editor -->
                    <div class="editor-main-content">
                        <div class="editor-header">
                            <button id="back-to-overview" class="btn-flat btn-sm back-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" class="arrow-icon">
                                    <line x1="19" y1="12" x2="5" y2="12"></line>
                                    <polyline points="12 19 5 12 12 5"></polyline>
                                </svg>
                                개요로 돌아가기
                            </button>
                            <div class="editor-actions">
                                <button id="spell-check-btn" class="btn-flat btn-sm" title="맞춤법 검사기 열기 (본문 자동 복사)">
                                    맞춤법 검사
                                </button>
                                <button id="export-chapter" class="btn-flat btn-sm" title="텍스트 파일로 내보내기">
                                    내보내기 (.txt)
                                </button>
                                <button id="delete-chapter" class="btn-flat btn-sm btn-danger" title="챕터 삭제">
                                    삭제
                                </button>
                            </div>
                        </div>

                        <div class="editor-container">
                            <div class="editor-meta">
                                <div class="chapter-badge" id="chapter-number-badge">CHAPTER 01</div>
                                <textarea id="chapter-title" class="input-flat chapter-title-input"
                                    placeholder="챕터 제목을 입력하세요..." rows="1"></textarea>
                            </div>

                            <div class="textarea-wrapper">
                                <textarea id="chapter-content" class="editor-textarea"
                                    placeholder="이곳에 이야기를 펼쳐나가세요..."></textarea>
                            </div>

                            <div class="editor-footer">
                                <div class="stat-group">
                                    <span class="stat-label">공백 포함:</span>
                                    <span id="char-count-with-spaces" class="stat-val">0자</span>
                                </div>
                                <div class="stat-divider">|</div>
                                <div class="stat-group">
                                    <span class="stat-label">공백 제외:</span>
                                    <span id="char-count-no-spaces" class="stat-val">0자</span>
                                </div>
                                <div class="stat-divider">|</div>
                                <div class="stat-group">
                                    <span class="stat-label">단어 수:</span>
                                    <span id="word-count" class="stat-val">0</span>
                                </div>
                                <div class="save-status" id="save-status">저장 완료</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
