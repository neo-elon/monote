<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monote — 작가를 위한 모노톤 메모장</title>
    <!-- Google Fonts: Nanum Myeongjo for Literary Serif, Outfit for Sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <span class="logo">Monote</span>
                <span class="logo-sub">for writers</span>
            </div>
            <div class="header-actions">
                <button id="export-project" class="btn-flat btn-sm" title="전체 백업 다운로드">백업 (.json)</button>
                <button id="import-project-trigger" class="btn-flat btn-sm btn-danger" title="백업 파일 불러오기">불러오기</button>
                <input type="file" id="import-project-file" accept=".json" style="display: none;">
                <button id="theme-toggle" class="btn-icon" title="테마 변경" aria-label="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="app-main">
            <!-- VIEW 1: OVERVIEW SCREEN -->
            <section id="overview-screen" class="view-section active">
                <div class="overview-grid">
                    <!-- Left Column: Novel Info & Synopsis -->
                    <div class="project-info-panel">
                        <div class="panel-section">
                            <label for="project-title" class="section-label">작품 제목</label>
                            <input type="text" id="project-title" class="input-flat title-input" placeholder="작품의 이름을 지어주세요..." autocomplete="off">
                        </div>
                        <div class="panel-section">
                            <div class="label-row">
                                <label for="project-synopsis" class="section-label">전체 시놉시스 / 개요</label>
                                <span id="synopsis-word-count" class="char-counter">0자</span>
                            </div>
                            <textarea id="project-synopsis" class="textarea-flat synopsis-textarea" placeholder="여기에 이야기의 시작과 끝, 핵심 줄거리를 기록하세요..."></textarea>
                        </div>
                    </div>

                    <!-- Right Column: Chapters List -->
                    <div class="chapters-panel">
                        <div class="panel-header">
                            <h2 class="panel-title">목차 및 챕터</h2>
                            <button id="add-chapter-btn" class="btn-flat btn-sm">
                                <span class="plus-icon">+</span> 챕터 추가
                            </button>
                        </div>
                        <div id="chapters-list" class="chapters-list">
                            <!-- Chapter cards will be generated dynamically -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- VIEW 2: WRITING SCREEN -->
            <section id="writing-screen" class="view-section">
                <div class="editor-header">
                    <button id="back-to-overview" class="btn-flat btn-sm back-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow-icon"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        개요로 돌아가기
                    </button>
                    <div class="editor-actions">
                        <button id="export-chapter" class="btn-flat btn-sm" title="텍스트 파일로 내보내기">
                            내보내기 (.txt)
                        </button>
                        <button id="delete-chapter" class="btn-flat btn-sm btn-danger" title="챕터 삭제">
                            삭제
                        </button>
                    </div>
                </div>

                <div class="editor-container">
                    <div class="editor-meta">
                        <input type="text" id="chapter-title" class="input-flat chapter-title-input" placeholder="챕터 제목을 입력하세요..." autocomplete="off">
                        <div class="chapter-badge" id="chapter-number-badge">CHAPTER 01</div>
                    </div>
                    
                    <div class="textarea-wrapper">
                        <textarea id="chapter-content" class="editor-textarea" placeholder="이곳에 이야기를 펼쳐나가세요..."></textarea>
                    </div>

                    <div class="editor-footer">
                        <div class="stat-group">
                            <span class="stat-label">공백 포함:</span>
                            <span id="char-count-with-spaces" class="stat-val">0자</span>
                        </div>
                        <div class="stat-divider">|</div>
                        <div class="stat-group">
                            <span class="stat-label">공백 제외:</span>
                            <span id="char-count-no-spaces" class="stat-val">0자</span>
                        </div>
                        <div class="stat-divider">|</div>
                        <div class="stat-group">
                            <span class="stat-label">단어 수:</span>
                            <span id="word-count" class="stat-val">0</span>
                        </div>
                        <div class="save-status" id="save-status">저장 완료</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
